services:
  # 1. TIME-SERIES DATABASE
  influxdb:
    image: influxdb:latest
    container_name: forecaster-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
      - DOCKER_INFLUXDB_INIT_RETENTION=0

  # 2. VISUALIZATION ENGINE
  grafana:
    image: grafana/grafana:latest
    container_name: forecaster-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb
  # 3. MLOps TRACKING SERVER
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: forecaster-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server  --backend-store-uri sqlite:///home/mlflow/mlflow.db  --artifacts-destination /home/mlflow/artifacts  --host 0.0.0.0  --serve-artifacts
    volumes:
      - ./mlflow-data:/home/mlflow

  # 4. DAILY AUTOMATION ENGINE
  scheduler:
    build:
      context: ./ml_pipeline
      dockerfile: Dockerfile.scheduler
    container_name: forecaster-scheduler
    env_file: .env
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - influxdb
      - mlflow
    restart: unless-stopped

# PERSISTENT STORAGE LOCKERS
volumes:
  influxdb-data:
  grafana-data:
  mlruns:
